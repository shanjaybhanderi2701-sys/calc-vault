name: CI

on:
  push:
    branches: [main, app-163-phase6-integration, app-225-phase1-wave1, app-225-phase1-wave1-app248, app-255-phaseb-viewer, app-254-photo-actions, app-254-integration, app-256-multiselect, app-257-recycle-bin, app-279-album-management, app-287-org-polish, app-293-device-fix-pass, app-294-share, app-299-round2-fixes, app-301-saf-relock, app-304-collision-test, app-314-round3, app-317-hermetic-decrypt, app-322-recovery-crypto, app-324-recovery-setup-entry, app-326-recovery-settings, app-325-recovery-reset, app-325-integration, app-338-recovery-survive, app-344-fastscroll-chevron-land, app-345-fastscroll-neutral, app-359-doubletap-fix, app-350-w3-tracks-controls, app-351-w4-mini-player, app-379-immersive-video-player]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew --no-daemon --stacktrace ktlintCheck

      - name: Android Lint
        run: ./gradlew --no-daemon --stacktrace lintDebug

      - name: Unit tests
        run: ./gradlew --no-daemon --stacktrace testDebugUnitTest

      - name: Assemble (debug)
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/tests/
            **/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 7

  # Instrumented Definition-of-Done matrix (APP-225, build spec §11/§12, board hard
  # rule #2): proves hide/restore/recycle-bin/FLAG_SECURE with in-process MediaStore
  # content-query + file-inspection assertions — never manual emulator screenshots.
  # Each matrix leg boots a FRESH, dedicated AVD on a dedicated runner, satisfying the
  # no-shared-emulator rule. The tests self-grant MANAGE_EXTERNAL_STORAGE in @Before via
  # UiAutomation appops (see DoDTestSupport), so no adb pre-step is required here.
  instrumented:
    # Job name must equal the `main` ruleset's required status-check contexts
    # (APP-282): "Instrumented (API 30)" and "Instrumented (API 35)". Keeping these in
    # sync is what lets a green branch fast-forward onto the hard-gated main.
    name: Instrumented (API ${{ matrix.api-level }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 35]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest runners expose /dev/kvm but restrict it; open it up so the
      # emulator gets hardware acceleration (standard emulator-runner enablement step).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run instrumented DoD tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set +e
            ./gradlew --no-daemon --stacktrace connectedDebugAndroidTest
            gradle_code=$?
            # APP-344 hard gate: pull the on-device chevron screenshots written by
            # FastScrollChevronCaptureTest while the emulator is still alive. Best-effort —
            # never let the pull mask the real gradle result.
            adb pull /sdcard/chevron-evidence ./chevron-evidence || true
            # APP-384: pull the MX-Player redesign screenshots written by
            # MxPlayerRedesignCaptureTest (bottom bar, overflow groups, locked, gesture overlays).
            adb pull /sdcard/app384-evidence ./app384-evidence || true
            # APP-388: pull the round-3 polish screenshots written by Round3PolishCaptureTest
            # (thin seekbar, playlist thumbnails, modern playlist icon).
            adb pull /sdcard/app388-evidence ./app388-evidence || true
            # APP-395: pull the cropped/zoomed seekbar centring screenshots written by
            # SeekbarCenteringCaptureTest (thumb centred on track, at rest + mid-drag).
            adb pull /sdcard/app395-evidence ./app395-evidence || true
            exit $gradle_code

      - name: Upload chevron on-device screenshots (APP-344)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chevron-evidence-api-${{ matrix.api-level }}
          path: ./chevron-evidence/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload MX-Player redesign screenshots (APP-384)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app384-evidence-api-${{ matrix.api-level }}
          path: ./app384-evidence/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload round-3 polish screenshots (APP-388)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app388-evidence-api-${{ matrix.api-level }}
          path: ./app388-evidence/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload seekbar centring screenshots (APP-395)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app395-evidence-api-${{ matrix.api-level }}
          path: ./app395-evidence/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload connected test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: connected-reports-api-${{ matrix.api-level }}
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
          if-no-files-found: ignore
          retention-days: 7
