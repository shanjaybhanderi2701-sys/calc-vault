name: CI

on:
  push:
    branches: [main, app-163-phase6-integration, app-225-phase1-wave1, app-225-phase1-wave1-app248, app-255-phaseb-viewer, app-254-photo-actions, app-254-integration, app-256-multiselect, app-257-recycle-bin, app-279-album-management, app-287-org-polish]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew --no-daemon --stacktrace ktlintCheck

      - name: Android Lint
        run: ./gradlew --no-daemon --stacktrace lintDebug

      - name: Unit tests
        run: ./gradlew --no-daemon --stacktrace testDebugUnitTest

      - name: Assemble (debug)
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/tests/
            **/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 7

  # Instrumented Definition-of-Done matrix (APP-225, build spec §11/§12, board hard
  # rule #2): proves hide/restore/recycle-bin/FLAG_SECURE with in-process MediaStore
  # content-query + file-inspection assertions — never manual emulator screenshots.
  # Each matrix leg boots a FRESH, dedicated AVD on a dedicated runner, satisfying the
  # no-shared-emulator rule. The tests self-grant MANAGE_EXTERNAL_STORAGE in @Before via
  # UiAutomation appops (see DoDTestSupport), so no adb pre-step is required here.
  instrumented:
    # Job name must equal the `main` ruleset's required status-check contexts
    # (APP-282): "Instrumented (API 30)" and "Instrumented (API 35)". Keeping these in
    # sync is what lets a green branch fast-forward onto the hard-gated main.
    name: Instrumented (API ${{ matrix.api-level }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 35]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest runners expose /dev/kvm but restrict it; open it up so the
      # emulator gets hardware acceleration (standard emulator-runner enablement step).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run instrumented DoD tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew --no-daemon --stacktrace connectedDebugAndroidTest

      - name: Upload connected test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: connected-reports-api-${{ matrix.api-level }}
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
          if-no-files-found: ignore
          retention-days: 7
